<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Contatos - Santa Luzia</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="topo"></div>

  <div class="perfil">
    <img src="logo-SantaLuzia.png" alt="logo">
  </div>

  <h1> SANTA LUZIA </h1>
  <div class="subtitulo">Optometria</div>

  <div class="descricao">
    Aqui estão meus principais links e formas de contato
  </div>

  <a class="botao insta" href="https://www.instagram.com" target="_blank">
    <img src="../img/icone-instagram.png" class="icone">
    Conheça meu Instagram
  </a>

  <a class="botao whats" href="https://wa.me/5522998758618" target="_blank">
    <img src="../img/icone-whatsapp.png" class="icone">
    Fale comigo no WhatsApp
  </a>

  <div class="botao pix" onclick="copiarPix()">
    <img src="../img/icone-pix.png" class="icone">
    Pagar com Pix (copiar chave)
  </div>
  
  <a class="botao wifi" onclick="copiarWifi()">
    <img src="../img/icone-wifi.png" class="icone">
    Acessar Wi-Fi: Nome da Rede
  </a>

  <!--<a class="botao endereco" href="https://g.page/r/CYXH9XSk5khVEBM/review" target="_blank">
    <img src="../img/icone-localizacao.png" class="icone">
    Ver Localização
  </a>-->

  <a class="botao avaliacao" href="https://www.google.com/maps/" target="_blank">
    <img src="../img/icone-avaliacao.png" class="icone">
    Fazer Avaliação no Google
  </a>

  <div id="toast">
    <div class="toast-title"></div>
    <div class="toast-text"></div>
  </div>

<script>
  function mostrarToast(titulo, mensagem) {
    const toast = document.getElementById("toast");
    const toastTitle = toast.querySelector(".toast-title");
    const toastText = toast.querySelector(".toast-text");

    // Define os textos personalizados
    toastTitle.innerText = titulo;
    toastText.innerText = mensagem;

    // Mostra o toast
    toast.classList.add("show");

    // Esconde depois de 4 segundos
    setTimeout(() => {
      toast.classList.remove("show");
    }, 4000);
  }

  function copiarPix() {
    const chavePix = "22998758618";
    
    navigator.clipboard.writeText(chavePix).then(() => {
      mostrarToast("Chave Pix Copiada!", "Abra o app do seu banco e cole a chave para pagar.");
    });
  }

  function copiarWifi() {
    const senhaWifi = "SENHAWIFI"; // Coloque sua senha real aqui
    
    navigator.clipboard.writeText(senhaWifi).then(() => {
      mostrarToast("Senha do Wi-Fi Copiada!", "Agora é só colar na rede: Nome da Rede");
    });

  }
</script>

</body>
</html>
