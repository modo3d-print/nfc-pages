<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Contatos - Ótica Chambella</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="topo"></div>

  <div class="perfil">
    <img src="oticaChambella.png" alt="logo">
  </div>

  <h1>Ótica Chambella</h1>
  <div class="subtitulo">Clareza que você confia, qualidade que você merece.</div>

  <div class="descricao">
    Aqui estão meus principais links e formas de contato
  </div>

  <a class="botao insta" href="https://www.instagram.com/oticachambella?igsh=dTViM2JicXlibnV1" target="_blank">
    <img src="../img/icone-instagram.png" class="icone">
    Conheça meu Instagram
  </a>

  <a class="botao whats" href="https://wa.me/message/TK2WJKKGP5XVH1" target="_blank">
    <img src="../img/icone-whatsapp.png" class="icone">
    Fale comigo no WhatsApp
  </a>

  <div class="botao pix" onclick="copiarPix()">
    <img src="../img/icone-pix.png" class="icone">
    Pagar com Pix (copiar chave)
  </div>
  
  <a class="botao wifi" onclick="copiarWifi()">
    <img src="../img/icone-wifi.png" class="icone">
    Wi-Fi: Ótica Chambella
  </a>

  <a class="botao endereco" href="https://maps.app.goo.gl/MYtxNwhWWxQsQMpi6" target="_blank">
    <img src="../img/icone-localizacao.png" class="icone">
    Ver Localização
  </a>

  <a class="botao avaliacao" href="https://g.page/r/CUwPC3HhC36eEBM/review" target="_blank">
    <img src="../img/icone-avaliacao.png" class="icone">
    Fazer Avaliação no Google
  </a>

  <div id="toast">
    <div class="toast-title"></div>
    <div class="toast-text"></div>
  </div>

  <script>
    function mostrarToast(titulo, mensagem) {
      const toast = document.getElementById("toast");
      const toastTitle = toast.querySelector(".toast-title");
      const toastText = toast.querySelector(".toast-text");

      // Define os textos personalizados
      toastTitle.innerText = titulo;
      toastText.innerText = mensagem;

      // Mostra o toast
      toast.classList.add("show");

      // Esconde depois de 4 segundos
      setTimeout(() => {
        toast.classList.remove("show");
      }, 4000);
    }

    function copiarPix() {
      const chavePix = "65886117000160";
      
      navigator.clipboard.writeText(chavePix).then(() => {
        mostrarToast("Chave Pix Copiada!", "Abra o app do seu banco e cole a chave para pagar.");
      });
    }

    function copiarWifi() {
      const senhaWifi = "chambella"; // Coloque sua senha real aqui
      
      navigator.clipboard.writeText(senhaWifi).then(() => {
        mostrarToast("Senha do Wi-Fi Copiada!", "Agora é só colar na rede: Ótica Chambella");
      });
    }
</script>

</body>
</html>
