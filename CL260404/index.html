  <div id="toast">

<script>
  function mostrarToast(titulo, mensagem) {
    const toast = document.getElementById("toast");
    const toastTitle = toast.querySelector(".toast-title");
    const toastText = toast.querySelector(".toast-text");

    // Define os textos personalizados
    toastTitle.innerText = titulo;
    toastText.innerText = mensagem;

    // Mostra o toast
    toast.classList.add("show");

    // Esconde depois de 4 segundos
    setTimeout(() => {
      toast.classList.remove("show");
    }, 4000);
  }

  function copiarPix() {
    const chavePix = "00020126580014BR.GOV.BCB.PIX01361e17f904-d5fb-4c07-b86d-cd30f308d1a95204000053039865802BR5925VAGNER BARBOSA OPTOMETRIA6009SAO PAULO61080540900062250521V62F2BqEGVdLCn7dpszb26304E47F";
    
    navigator.clipboard.writeText(chavePix).then(() => {
      mostrarToast("Código Pix Copiado!", "Abra o app do seu banco e cole o código para pagar.");
    });
  }
